name: Build oss-launch

# Self-contained oss-launch binaries (bundled Node) so a customer box can run per-agent local
# routing with NO system Node. Mirrors release-cli-decrypt.yml: esbuild -> .cjs -> pkg, building the
# arm64 target on a NATIVE arm64 runner (pkg compiles JS -> V8 bytecode per CPU arch and cannot
# cross-generate it).
on:
  push:
    tags:
      - 'oss-launch-v*'
  workflow_dispatch: {}

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: node18-macos-arm64
            artifact: oss-launch-Darwin-arm64
          - os: macos-latest
            target: node18-macos-x64
            artifact: oss-launch-Darwin-x64
          - os: ubuntu-latest
            target: node18-linux-x64
            artifact: oss-launch-Linux-x64
          # MUST be a native arm64 runner — pkg cannot cross-generate arm64 V8 bytecode (a binary
          # built on x64 fails at runtime with a missing-snapshot-module error). Same lesson as
          # the oss-decrypt arm64 fix.
          - os: ubuntu-24.04-arm
            target: node18-linux-arm64
            artifact: oss-launch-Linux-arm64

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: watcher

      - name: Build bundle (tsc + esbuild standalone oss-launch.cjs)
        run: npm run build
        working-directory: watcher

      - name: Install pkg
        # Pinned for reproducible binaries — the SHA-256 we publish must sign a deterministic build.
        run: npm install -g pkg@5.8.1

      - name: Build binary
        run: pkg dist/cli/oss-launch.cjs --target ${{ matrix.target }} --output dist/bin/${{ matrix.artifact }}
        working-directory: watcher

      - name: Smoke — binary runs WITHOUT a system Node (the customer-box guarantee)
        run: |
          # Strip Node from PATH; a pkg binary embeds its own runtime so --version must still work.
          out="$(env PATH=/usr/bin:/bin dist/bin/${{ matrix.artifact }} --version)"
          echo "version output: $out"
          case "$out" in oss-launch\ *) echo "OK: standalone --version" ;; *) echo "FAIL"; exit 1 ;; esac
        working-directory: watcher

      - name: Generate SHA-256 checksum
        run: shasum -a 256 dist/bin/${{ matrix.artifact }} > dist/bin/${{ matrix.artifact }}.sha256
        working-directory: watcher

      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: watcher/dist/bin/${{ matrix.artifact }}

      - name: Upload checksum artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}.sha256
          path: watcher/dist/bin/${{ matrix.artifact }}.sha256

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          files: |
            artifacts/oss-launch-Darwin-arm64/oss-launch-Darwin-arm64
            artifacts/oss-launch-Darwin-x64/oss-launch-Darwin-x64
            artifacts/oss-launch-Linux-x64/oss-launch-Linux-x64
            artifacts/oss-launch-Linux-arm64/oss-launch-Linux-arm64
            artifacts/oss-launch-Darwin-arm64.sha256/oss-launch-Darwin-arm64.sha256
            artifacts/oss-launch-Darwin-x64.sha256/oss-launch-Darwin-x64.sha256
            artifacts/oss-launch-Linux-x64.sha256/oss-launch-Linux-x64.sha256
            artifacts/oss-launch-Linux-arm64.sha256/oss-launch-Linux-arm64.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
